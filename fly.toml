# fly.toml — Fly.io deployment configuration for Manim Studio
# https://fly.io/docs/reference/configuration/

app = "manim-studio"
primary_region = "iad"

[build]
  # Use the existing Dockerfile
  dockerfile = "Dockerfile"

[env]
  # Production environment
  FLASK_ENV = "production"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "20s"
    method = "GET"
    path = "/api/status"

# Resource allocation for Manim rendering
# Machine size should handle video rendering workloads
[[vm]]
  cpu_kind = "performance"
  cpus = 2
  memory_mb = 2048

# Optional: Persistent storage for renders (survives deploys)
# Uncomment if you need renders to persist across machine restarts
# [mounts]
#   source = "renders_volume"
#   destination = "/app/renders"
